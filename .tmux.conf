# remove ctrl+b
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# scroll
set -g history-limit 10000

# reload config
bind-key r source-file ~/.tmux.conf \; display-message "config reloaded"

# vim window movement
bind-key h previous-window
bind-key l next-window

# status bar color
set -g status-style bg=#2a2c2f,fg=colour37
set -g window-status-style bg=#2a2c2f,fg=colour37
set -g window-status-current-style bg=#2a2c2f,fg=colour37

# hour, date and distro
set -g status-right "#(cat /etc/os-release | grep ^NAME= | cut -d'=' -f2 | tr -d '\"')"


